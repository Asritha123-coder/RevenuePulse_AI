services:
  db:
    image: postgres:16-alpine
    container_name: revenuepulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: revenue_pulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d revenue_pulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: revenuepulse-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:admin123@db:5432/revenue_pulse
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: revenuepulse-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
